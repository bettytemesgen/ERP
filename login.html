<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f4f6f9; }
    .box { background:white; padding:30px; border-radius:8px; width:300px; }
    input, button { width:100%; padding:10px; margin:10px 0; }
    button { background:#3498db; color:white; border:none; }
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <p>No account? <a href="signup.html">Sign up</a></p>
</div>

<script>
function login() {
  let users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u =>
    u.email === document.getElementById("email").value &&
    u.password === document.getElementById("password").value
  );

  if (!user) {
    alert("Invalid login");
    return;
  }

  localStorage.setItem("currentUser", JSON.stringify(user));

  window.location.href = "erp.html"; // your main page
}
</script>

</body>
</html>
